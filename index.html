<!DOCTYPE html>
<html>
<head>
<title>Do you love me?</title>

<style>

body{
text-align:center;
background:#f3d8e0;
font-family:Arial;
margin-top:100px;
}

img{
width:200px;
margin:20px;
}

button{
padding:12px 25px;
font-size:20px;
border:none;
border-radius:20px;
margin:10px;
cursor:pointer;
}

#yes{
background:#ff4da6;
color:white;
}

#no{
background:#f08ab3;
}

</style>

</head>

<body>

<img id="bear" src="osito2.png">

<h1 id="question">Do you love me?</h1>

<button id="yes" onclick="yesClick()">Yes</button>
<button id="no" onclick="noClick()">No</button>

<script>

let size = 20;

function noClick(){
size = size + 10;
document.getElementById("yes").style.fontSize = size + "px";
}

function yesClick(){
document.getElementById("bear").src = "osito.gif";
document.getElementById("question").innerText = "I knew it ❤️";
}

</script>

</body>
</html>
